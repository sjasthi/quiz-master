<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Python Quiz 1</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f8f9fa;
            padding: 20px;
        }

        .quiz-box {
            max-width: 800px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
        }

        h1 {
            color: #0d6efd;
        }

        .question {
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid #ddd;
        }

        .submit-btn {
            background-color: #0d6efd;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }

        .submit-btn:hover {
            background-color: #0b5ed7;
        }
    </style>
</head>

<body>

<div class="quiz-box">
    <h1>Python Quiz 1</h1>
    <p>Answer all questions, then click submit.</p>

    <form id="quizForm">

        <div class="question">
            <p><strong>1. What function displays output in Python?</strong></p>
            <label><input type="radio" name="q1" value="a"> input()</label><br>
            <label><input type="radio" name="q1" value="b"> print()</label><br>
            <label><input type="radio" name="q1" value="c"> display()</label><br>
        </div>

        <div class="question">
            <p><strong>2. Which data type stores whole numbers?</strong></p>
            <label><input type="radio" name="q2" value="a"> string</label><br>
            <label><input type="radio" name="q2" value="b"> float</label><br>
            <label><input type="radio" name="q2" value="c"> int</label><br>
        </div>

        <div class="question">
            <p><strong>3. Which symbol starts a comment in Python?</strong></p>
            <label><input type="radio" name="q3" value="a"> //</label><br>
            <label><input type="radio" name="q3" value="b"> #</label><br>
            <label><input type="radio" name="q3" value="c"> --</label><br>
        </div>

        <button type="button" class="submit-btn" onclick="submitQuiz()">Submit Quiz</button>
    </form>
</div>

<script>
    function submitQuiz() {
        let score = 0;

        if (document.querySelector('input[name="q1"]:checked')?.value === "b") {
            score += 1;
        }

        if (document.querySelector('input[name="q2"]:checked')?.value === "c") {
            score += 1;
        }

        if (document.querySelector('input[name="q3"]:checked')?.value === "b") {
            score += 1;
        }

        const finalScore = Math.round((score / 3) * 100);

        window.parent.postMessage({
            quizTitle: "Python Quiz 1",
            score: finalScore,
            correctAnswers: score,
            totalQuestions: 3
        }, "*");
    }
</script>

</body>
</html>
